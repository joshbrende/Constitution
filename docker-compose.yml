version: "3.9"

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: constitution-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: constitution
      DB_USERNAME: constitution
      DB_PASSWORD: constitution
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: constitution-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: constitution-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: constitution
      MYSQL_USER: constitution
      MYSQL_PASSWORD: constitution
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: constitution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  db_data:

