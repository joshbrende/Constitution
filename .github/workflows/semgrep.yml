# SAST for PHP (Laravel) and JavaScript — complements CodeQL (PHP is not supported by CodeQL).
name: Semgrep

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan (PHP + JavaScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: >
          semgrep scan
          --config p/php
          --config p/javascript
          --exclude '**/node_modules/**'
          --exclude '**/vendor/**'
          --sarif --output semgrep.sarif
          backend/app mobile

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep
